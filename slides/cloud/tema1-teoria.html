## Teoría (Clase 1)
### Qué es la computación en la nube
- Acceso a recursos informáticos **bajo demanda** (internet)
- Pago por uso / elasticidad / disponibilidad
- Modelos comunes: infraestructura, plataformas, software

**Idea clave:** 

La nube es un modelo operativo, no “un sitio”.

# Clase 2
## Modelos cloud: IaaS, PaaS, SaaS

---

## Teoría (Clase 2)
### IaaS, PaaS, SaaS (definición rápida)

- **SaaS:** alquilas software listo (CRM, email, analítica)
- **PaaS:** alquilas plataforma (runtime, despliegue, escalado)
- **IaaS:** alquilas infraestructura (servidores, redes, almacenamiento)

**Regla práctica:** cuanto más arriba, menos control; cuanto más abajo, más responsabilidad.

---

## Teoría (Clase 2)
### Ejemplos (turismo)
- **IaaS:** servidores para motor de reservas propio
- **PaaS:** backend desplegado gestionado (APIs, colas, funciones)
- **SaaS:** PMS/CRM/Email marketing/Analytics ya operativos

### Slide — Idea clave (muy importante didácticamente)


## Idea clave (Clase 2)

- **No se elige IaaS / PaaS / SaaS por moda**  

Se elige según:

- tamaño del negocio
- capacidad técnica
- riesgo asumible
- necesidad de escalar

---

## Hotel pequeño vs OTA

**Hotel pequeño**
- Web: SaaS
- Reservas: SaaS
- Email: SaaS

**OTA**
- **Frontend:** PaaS
- **Backend:** PaaS / IaaS
- Datos (db): PaaS / IaaS

➡️ **El modelo depende del negocio, no del sector**

---

## Para llevarte hoy

- SaaS = rapidez y menor riesgo
- PaaS = equilibrio entre control y facilidad
- IaaS = máximo control, máxima responsabilidad

➡️ En turismo, **SaaS suele ser el punto de partida**

# Clase 3

## Proveedores cloud y servicios clave

---

## Los 3 grandes

* **AWS** – líder en cuota de mercado
* **Microsoft Azure** – fuerte en empresa tradicional
* **Google Cloud** – fuerte en datos e IA

---

![aws-azure-gcp.png](aws-azure-gcp.png)

---

## Qué venden realmente

No venden “la nube”.

Venden:

* Servidores (compute)
* Almacenamiento (storage)
* Bases de datos
* Redes
* Seguridad
* Servicios de IA

---

## Servicios clave en turismo

* Motor de reservas → Compute + DB
* Web → Hosting + CDN
* Pagos → Seguridad + APIs
* Analítica → Data warehouse
* Personalización → IA

---

![cloud-services-layer.png](cloud-services-layer.png)

---

## Key points (Clase 3)

* Los proveedores ofrecen bloques modulares
* Se combinan servicios según necesidad
* En turismo, datos y disponibilidad son críticos
* El proveedor importa menos que la arquitectura

---

Costes, ventajas y riesgos reales del cloud

# Clase 4

## Ventajas, riesgos y costes del cloud

---

## Ventajas

* Escalabilidad inmediata
* Pago por uso
* Disponibilidad global
* Integración rápida con APIs

---

![scalability.png](scalability.png)

---

## Riesgos

* Lock-in (dependencia proveedor)
* Caídas del servicio
* Costes mal calculados
* Seguridad mal configurada

---

![server-down.jpg](server-down.jpg)

---

## Costes (idea simple)

Pagas por:

* Uso de servidor (horas)
* Almacenamiento (GB)
* Transferencia de datos
* Servicios adicionales (DB, IA…)

---

## Key points (Clase 4)

* El cloud reduce barreras de entrada
* No elimina riesgos
* Mal diseño = costes altos
* Decidir cloud es decidir modelo de negocio
