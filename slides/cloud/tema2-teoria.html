# Clase 6

## Bases de datos en la nube: SQL vs NoSQL

---

## ¿Qué es una base de datos?

Sistema que permite:

* Guardar datos
* Organizar datos
* Consultar datos
* Modificar datos

En turismo:
reservas, clientes, pagos, disponibilidad.

---

![database-basic.png](database-basic.png)

---

## SQL (relacional)

* Datos estructurados en tablas
* Relaciones claras entre entidades
* Esquema fijo
* Lenguaje estándar: SQL

Ejemplo:
Clientes ↔ Reservas ↔ Pagos

---

![sql-table.png](sql-table.png)

---

## NoSQL (no relacional)

* Estructura flexible
* Documentos, clave-valor, grafos…
* Escalabilidad horizontal
* Ideal para grandes volúmenes variables

Ejemplo:
Historial de navegación, logs, recomendaciones.

---

![nosql-doc.png](nosql-doc.png)

---

## Comparación rápida

| SQL                  | NoSQL                |
| -------------------- | -------------------- |
| Estructura rígida    | Estructura flexible  |
| Relaciones complejas | Datos masivos        |
| Consistencia fuerte  | Escala masiva        |
| Ideal reservas/pagos | Ideal comportamiento |

---

## ¿Qué usar en turismo?

* Sistema de reservas → SQL
* Logs de usuario → NoSQL
* CRM → SQL
* Recomendaciones → NoSQL

➡️ Muchas empresas usan ambos

---

## Key points (Clase 6)

* SQL = estructura y relaciones
* NoSQL = flexibilidad y escala
* No es competencia, es complementariedad
* El modelo de datos impacta el negocio

---

# Clase 7

## Consultas básicas y análisis de datos

---

## ¿Qué es una consulta?

Una pregunta a la base de datos.

Ejemplo:

* ¿Cuántas reservas hoy?
* ¿Cuál es el destino más vendido?
* ¿Qué cliente repite más?

---

![query.png](query.png)

[W3schools](https://www.w3schools.com/sql/trysql.asp?filename=trysql_select_all)

---

## SELECT

Selecciona datos.

```sql
SELECT nombre, email
FROM clientes;
```

---

## COUNT

Cuenta registros.

```sql
SELECT COUNT(*)
FROM reservas;
```

---

## GROUP BY

Agrupa resultados.

```sql
SELECT destino, COUNT(*)
FROM reservas
GROUP BY destino;
```

---

## En turismo sirve para:

* Detectar temporada alta
* Analizar destinos populares
* Calcular repetición de clientes
* Optimizar precios

---

![data-analysis.png](data-analysis.png)

---

## Key points (Clase 7)

* Los datos no sirven sin consultas
* Las consultas responden preguntas de negocio
* SQL básico ya permite análisis útiles
* Cloud facilita ejecutar consultas a escala

---

## Qué necesitamos

- Navegador web
- Acceso al entorno cloud (enlace compartido)
- Dataset turístico de ejemplo

- ✅ No instalaremos nada.  
- ✅ No configuraremos servidores.  
- ✅ Todo se hace online.

---

![where-is-backup.png](where-is-backup.png)
