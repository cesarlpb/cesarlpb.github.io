# Clase 18
## IA en turismo · Tema 5

Personalización y datos

---

## ¿Dónde aparece la IA?

- Recomendaciones de viajes y upselling
- Precios dinámicos y demanda
- Chatbots y atención 24/7
- Personalización de búsqueda y ofertas

---

![data-processing.png](data-processing.png)

Datos + modelos → decisiones y experiencia

---

## Ejemplo de flujo

Usuario entra en una web

↓

El sistema **analiza** comportamiento o contexto (datos)

↓

**Recomienda** destinos u ofertas más relevantes

---

## Key points (Clase 18)

- IA potencia **personalización** y eficiencia
- Mejora la **experiencia** si hay datos de calidad
- Los datos son la **base**; la nube ayuda a procesarlos a escala

---

# Clase 19
## Edge, IoT y sostenibilidad · Tema 5

Futuro del cloud en turismo

---

## Agenda (Clase 19)

- Edge computing
- IoT en destinos y alojamientos
- Cloud sostenible (“green cloud”)

---

## Edge computing

Procesar datos **cerca** del usuario o del dispositivo (baja latencia, menos idas y venidas al centro de datos).

**Ejemplos:** aeropuerto, hotel, evento masivo, app con mucha interacción en tiempo real.

---

## IoT en turismo

- Sensores en habitaciones (confort, mantenimiento)
- Control de energía y ocupación
- Experiencias conectadas en destino

---

## Sostenibilidad

- Optimizar **recursos** (compute, almacenamiento, red)
- Reducir **desperdicio** energético con arquitecturas eficientes
- Elegir regiones, servicios y patrones más **sostenibles** cuando sea posible

---

## Key points (Clase 19)

- El futuro combina **datos**, **dispositivos** y **ubicación**
- Edge e IoT exigen pensar en **privacidad** y **operación**
- La **sostenibilidad** es criterio de diseño, no solo marketing

---
