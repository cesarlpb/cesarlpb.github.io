## Teoría (Clase 2)
### IaaS, PaaS, SaaS (definición rápida)

- **SaaS:** alquilas software listo (CRM, email, analítica)
- **PaaS:** alquilas plataforma (runtime, despliegue, escalado)
- **IaaS:** alquilas infraestructura (servidores, redes, almacenamiento)

**Regla práctica:** cuanto más arriba, menos control; cuanto más abajo, más responsabilidad.

---

## Teoría (Clase 2)
### Ejemplos (turismo)
- **IaaS:** servidores para motor de reservas propio
- **PaaS:** backend desplegado gestionado (APIs, colas, funciones)
- **SaaS:** PMS/CRM/Email marketing/Analytics ya operativos

- Datos (db): PaaS / IaaS

➡️ **El modelo depende del negocio, no del sector**

# Clase 6

## Bases de datos en la nube: SQL vs NoSQL

---

## Agenda (Clase 6)

* Qué es una base de datos
* Diferencias SQL vs NoSQL

---

## ¿Qué es una base de datos?

Sistema que permite:

* Guardar datos
* Organizar datos
* Consultar datos
* Modificar datos

En turismo:
reservas, clientes, pagos, disponibilidad.

---

![database-basic.png](database-basic.png)

---

## SQL (relacional)

* Datos estructurados en tablas
* Relaciones claras entre entidades
* Esquema fijo
* Lenguaje estándar: SQL

Ejemplo:
Clientes ↔ Reservas ↔ Pagos

---

![sql-table.png](sql-table.png)

---

## NoSQL (no relacional)

* Estructura flexible
* Documentos, clave-valor, grafos…
* Escalabilidad horizontal
* Ideal para grandes volúmenes variables

Ejemplo:
Historial de navegación, logs, recomendaciones.

---

![nosql-doc.png](nosql-doc.png)

---

## Comparación rápida

| SQL                  | NoSQL                |
| -------------------- | -------------------- |
| Estructura rígida    | Estructura flexible  |
| Relaciones complejas | Datos masivos        |
| Consistencia fuerte  | Escala masiva        |
| Ideal reservas/pagos | Ideal comportamiento |

---

## ¿Qué usar en turismo?

* Sistema de reservas → SQL
* Logs de usuario → NoSQL
* CRM → SQL
* Recomendaciones → NoSQL

➡️ Muchas empresas usan ambos

---

## Agenda (Clase 7)

## ¿Qué es una consulta?

Una pregunta a la base de datos.

Ejemplo:

* ¿Cuántas reservas hoy?
* ¿Cuál es el destino más vendido?
* ¿Qué cliente repite más?

---

![query.png](query.png)

[W3schools](https://www.w3schools.com/sql/trysql.asp?filename=trysql_select_all)

---

## SELECT

Selecciona datos.

```sql
SELECT nombre, email
FROM clientes;
```

---

## COUNT

Cuenta registros.

```sql
SELECT COUNT(*)
FROM reservas;
```

---

## GROUP BY

Agrupa resultados.

```sql
SELECT destino, COUNT(*)
FROM reservas
GROUP BY destino;
```

---

## En turismo sirve para:

* Detectar temporada alta
* Analizar destinos populares
* Calcular repetición de clientes
* Optimizar precios

---

# Clase 19
## Edge, IoT y sostenibilidad · Tema 5

Futuro del cloud en turismo

---

## Agenda (Clase 19)

- Edge computing
- IoT en destinos y alojamientos
- Cloud sostenible (“green cloud”)

---

## Edge computing

Procesar datos **cerca** del usuario o del dispositivo (baja latencia, menos idas y venidas al centro de datos).

**Ejemplos:** aeropuerto, hotel, evento masivo, app con mucha interacción en tiempo real.

---

## IoT en turismo

- Sensores en habitaciones (confort, mantenimiento)
- Control de energía y ocupación
- Experiencias conectadas en destino

---

## Sostenibilidad

- Optimizar **recursos** (compute, almacenamiento, red)
- Reducir **desperdicio** energético con arquitecturas eficientes
- Elegir regiones, servicios y patrones más **sostenibles** cuando sea posible

---

---

## Key points (Clase 19)

- Edge e IoT exigen pensar en **privacidad** y **operación**
- La **sostenibilidad** es criterio de diseño, no solo marketing
